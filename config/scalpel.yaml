default_concurrency: 8
max_file_bytes: 33554432
languages:
  - id: javascript
    extensions: [js, cjs, mjs, jsx]
    strategy: regex
    patterns:
      - kind: function
        regex: '(?m)^\s*(?:export\s+)?function\s+([A-Za-z_][A-Za-z0-9_]*)\s*\('
        capture_group: 1
        block_scoped: true
      - kind: function
        regex: '(?m)^\s*(?:export\s+)?(?:const|let|var)\s+([A-Za-z_][A-Za-z0-9_]*)\s*=\s*(?:async\s*)?\([^)]*\)\s*=>'
        capture_group: 1
        block_scoped: true
      - kind: class
        regex: '(?m)^\s*(?:export\s+)?class\s+([A-Za-z_][A-Za-z0-9_]*)'
        capture_group: 1
      - kind: import
        regex: "(?m)^\\s*import\\s+.*?from\\s+[\"']([^\"']+)[\"']"
        capture_group: 1
  - id: typescript
    extensions: [ts, tsx]
    strategy: regex
    patterns:
      - kind: function
        regex: '(?m)^\s*(?:export\s+)?function\s+([A-Za-z_][A-Za-z0-9_]*)\s*\('
        capture_group: 1
        block_scoped: true
      - kind: method
        regex: '(?m)^\s*(?:public\s+|private\s+|protected\s+|static\s+|async\s+|readonly\s+)*([A-Za-z_][A-Za-z0-9_]*)\s*\([^)]*\)\s*:\s*[A-Za-z_"][A-Za-z0-9_<>,\[\]\| "]*\s*\{'
        capture_group: 1
        block_scoped: true
      - kind: class
        regex: '(?m)^\s*(?:export\s+)?class\s+([A-Za-z_][A-Za-z0-9_]*)'
        capture_group: 1
        block_scoped: true
      - kind: import
        regex: "(?m)^\\s*import\\s+.*?from\\s+[\"']([^\"']+)[\"']"
        capture_group: 1
  - id: go
    extensions: [go]
    strategy: regex
    patterns:
      - kind: function
        regex: '(?m)^\s*func\s+([A-Za-z_][A-Za-z0-9_]*)\s*\('
        capture_group: 1
        block_scoped: true
      - kind: method
        regex: '(?m)^\s*func\s*\([^)]*\)\s*([A-Za-z_][A-Za-z0-9_]*)\s*\('
        capture_group: 1
        block_scoped: true
      - kind: type
        regex: '(?m)^\s*type\s+([A-Za-z_][A-Za-z0-9_]*)\s+'
        capture_group: 1
      - kind: import
        regex: '(?m)^\s*import\s+"([^"]+)"'
        capture_group: 1
  - id: rust
    extensions: [rs]
    strategy: regex
    patterns:
      - kind: function
        regex: '(?m)^\s*(?:pub\s+)?fn\s+([A-Za-z_][A-Za-z0-9_]*)\s*\('
        capture_group: 1
        block_scoped: true
      - kind: type
        regex: '(?m)^\s*(?:pub\s+)?(?:struct|enum|trait)\s+([A-Za-z_][A-Za-z0-9_]*)'
        capture_group: 1
      - kind: method
        regex: '(?m)^\s*impl\s+([A-Za-z_][A-Za-z0-9_:<>]*)'
        capture_group: 1
      - kind: import
        regex: '(?m)^\s*use\s+([^;]+);'
        capture_group: 1
  - id: lua
    extensions: [lua]
    strategy: regex
    patterns:
      - kind: function
        regex: '(?m)^\s*(?:local\s+)?function\s+([A-Za-z_][A-Za-z0-9_\.:]*)\s*\('
        capture_group: 1
        block_scoped: true
      - kind: import
        regex: "(?m)^\\s*require\\s*\\(?\\s*[\"']([^\"']+)[\"']\\s*\\)?"
        capture_group: 1
  - id: markdown
    extensions: [md, markdown]
    strategy: markdown
  - id: text
    extensions: [txt]
    strategy: regex
    patterns:
      - kind: key
        regex: '(?m)^\s*([A-Za-z_][A-Za-z0-9_\-]*)\s*:\s*.*$'
        capture_group: 1
  - id: yaml
    extensions: [yaml, yml]
    strategy: yaml
  - id: json
    extensions: [json]
    strategy: json
  - id: jsonl
    extensions: [jsonl]
    strategy: jsonl
  - id: toml
    extensions: [toml]
    strategy: toml
